about_content: | # this will include new lines to allow paragraphs
  안녕하세요. C# 기반 응용 프로그램 개발을 주력으로 하는 김주성입니다.
  WPF, MVVM 패턴을 기반으로 한 데스크톱 애플리케이션 개발 경험이 있으며, 건설·BIM·디지털 트윈·스마트 항만·물 관리 솔루션 등 다양한 산업 도메인에서 소프트웨어 개발 업무를 수행했습니다.
  업무에서는 유지보수성과 확장성을 중요하게 생각하며, 실제 현장에서 사용할 수 있는 안정적인 프로그램을 만드는 데 집중하고 있습니다.

